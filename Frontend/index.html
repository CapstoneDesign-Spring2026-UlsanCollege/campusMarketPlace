<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UC Marketplace</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- 🌐 LANGUAGE SELECTOR -->
<div id="google_translate_element"></div>

<!-- ✨ WELCOME TEXT -->
<h2 id="welcome-text"></h2>

<!-- NAVBAR -->
<div class="navbar">
    <button class="login-btn" onclick="goToLogin()">Login</button>
    <button class="signup-btn" onclick="goToSignup()">Sign Up</button>
</div>

<!-- MAIN CONTENT -->
<div class="main">

    <!-- LOGO -->
    <img src="images/logo.png" alt="UC Marketplace Logo" class="logo">

    <h1>Ulsan College Marketplace</h1>
    <p class="tagline">Buy & Sell within Ulsan College</p>

    <div class="features">
        <p>✔ Campus-only access</p>
        <p>✔ Safe & trusted trading</p>
        <p>✔ Verified student accounts</p>
    </div>
</div>

<!-- FOOTER -->
<footer>
    This website is created by students of Ulsan College
</footer>

<!-- 🌍 GOOGLE TRANSLATE -->
<script>
function googleTranslateElementInit() {
    new google.translate.TranslateElement({
        pageLanguage: 'en',
        autoDisplay: false
    }, 'google_translate_element');
}
</script>

<script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<!-- 🔒 FORCE ENGLISH DEFAULT -->
<script>
window.addEventListener("load", function () {

    const interval = setInterval(() => {
        const select = document.querySelector(".goog-te-combo");

        if (select) {
            select.value = "en";
            select.dispatchEvent(new Event("change"));

            document.cookie = "googtrans=;path=/";

            clearInterval(interval);
        }
    }, 300);
});
</script>

<!-- ✨ TYPEWRITER EFFECT -->
<script>
const text = "Welcome to our Ulsan College Community!!!";
let index = 0;

function typeEffect() {
    if (index < text.length) {
        document.getElementById("welcome-text").innerHTML += text.charAt(index);
        index++;
        setTimeout(typeEffect, 50);
    }
}

window.onload = typeEffect;
</script>

<!-- 🔗 NAVIGATION -->
<script>
function goToLogin(){
    window.location.href = "login.html";
}

function goToSignup(){
    window.location.href = "signup.html";
}
</script>

</body>
</html>
