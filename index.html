<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="UC Marketplace - Buy & Sell within Ulsan College Campus" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>UC Marketplace</title>
  </head>
  <body>
    <div id="app">
      <nav id="navbar"></nav>
      <main id="main-content"></main>
      <footer id="footer"></footer>
    </div>

    <div id="cart-sidebar" class="cart-sidebar" aria-hidden="true">
      <div class="cart-overlay"></div>
      <div class="cart-panel">
        <div class="cart-header">
          <h2>Shopping Cart</h2>
          <button class="cart-close" aria-label="Close cart">&times;</button>
        </div>
        <div class="cart-items" id="cart-items-container"></div>
        <div class="cart-footer">
          <div class="cart-total">
            <span>Total:</span>
            <span id="cart-total-price">₩0</span>
          </div>
          <button class="btn-primary btn-full" id="checkout-btn">Checkout</button>
        </div>
      </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
